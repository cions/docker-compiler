name: Test Image

on:
  workflow_dispatch:
  # workflow_run:
  #   types: [ completed ]
  #   workflows: [ "Build Image" ]

jobs:
  test-gcc-image-1:
    name: Test Image (gcc:${{ matrix.version }}-${{ matrix.arch }})
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cions/gcc:${{ matrix.version }}-${{ matrix.arch }}
    timeout-minutes: 5
    steps:
    - uses: ./.github/actions/test-image
    strategy:
      fail-fast: false
      matrix:
        version: [15, 14, 13, 12, 11]
        arch:
        - aarch64
        - alpha
        - arm
        - hppa
        - i386
        - ia64
        - loong64
        - m68k
        - microblaze
        - mips
        - mips64
        - mips64el
        - mipsel
        - nios2
        - or1k
        - ppc
        - ppc64
        - ppc64le
        - riscv32
        - riscv64
        - s390x
        - sh4
        - sparc
        - sparc64
        - x86_64
        - xtensa
        exclude:
        - { version: 11, arch: loong64 }

  test-gcc-image-2:
    name: Test Image (gcc:${{ matrix.version }}-${{ matrix.arch }})
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cions/gcc:${{ matrix.version }}-${{ matrix.arch }}
    timeout-minutes: 5
    steps:
    - uses: ./.github/actions/test-image
    strategy:
      fail-fast: false
      matrix:
        version: [10, 9, 8, 7, 6, 5]
        arch:
        - aarch64
        - alpha
        - arm
        - hppa
        - i386
        - ia64
        - m68k
        - microblaze
        - mips
        - mips64
        - mips64el
        - mipsel
        - nios2
        - ppc
        - ppc64
        - ppc64le
        - riscv32
        - riscv64
        - s390x
        - sh4
        - sparc
        - sparc64
        - x86_64
        - xtensa
        include:
        - { version: 10, arch: or1k }
        exclude:
        - { version: 5, arch: ia64 }
        - { version: 7, arch: microblaze }
        - { version: 6, arch: microblaze }
        - { version: 5, arch: microblaze }
        - { version: 6, arch: riscv32 }
        - { version: 5, arch: riscv32 }
        - { version: 6, arch: riscv64 }
        - { version: 5, arch: riscv64 }

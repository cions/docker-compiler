name: "Test Image"
description: "Test Image"
author: "cions"
runs:
  using: composite
  steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Print compiler version
    shell: bash
    run: ${CC} --version
  - name: Print predefined macros
    shell: bash
    run: ${CC} -E -dM -x c /dev/null | sort
  - name: Test C program
    shell: bash
    env:
      SOURCE_CODE: |
        #include <stdio.h>
        #include <stdlib.h>

        int main(void) {
          printf("Hello, world!\n");
          exit(EXIT_SUCCESS);
        }
    run: |
      printf "%s" "${SOURCE_CODE}" > test-c.c
      ${CC} -O2 -v -o test-c test-c.c
      if command -v ${QEMU} >/dev/null; then
        ${QEMU} ./test-c
      fi
  - name: Test C++ program
    shell: bash
    env:
      SOURCE_CODE: |
        #include <atomic>
        #include <iostream>
        #include <stdexcept>
        #include <thread>
        #include <vector>

        int main() {
          try {
            throw std::runtime_error("exception");
          } catch (const std::exception&) {
            std::cout << "an exception was caught" << std::endl;
          }

          std::atomic<int> aint(1);

          std::vector<std::thread> threads;
          for (int i = 0; i < 16; ++i) {
            threads.emplace_back([&]() {
              int expected = aint.load(std::memory_order_seq_cst);
              while (!aint.compare_exchange_strong(expected, expected * 2, std::memory_order_seq_cst));
            });
          }
          for (auto && t : threads) {
            t.join();
          }

          int expected = 65536;
          int actual = aint.load(std::memory_order_seq_cst);
          std::cout << "expected: " << expected << ", actual: " << actual << std::endl;
          if (actual != expected) {
            return 1;
          }

          return 0;
        }
    run: |
      printf "%s" "${SOURCE_CODE}" > test-cpp.cpp
      ${CXX} -std=c++11 -O2 -v -o test-cpp test-cpp.cpp -pthread -Wl,--as-needed -latomic -Wl,--no-as-needed
      if command -v ${QEMU} >/dev/null; then
        ${QEMU} ./test-cpp
      fi
